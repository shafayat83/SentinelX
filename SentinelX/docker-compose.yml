services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ${DB_NAME:-makeit}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    # Security: Do not expose port 5432 to the host publicly. Only allow internal docker network access
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  redis:
    image: redis:7-alpine
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password}@db/${DB_NAME:-makeit}
      - REDIS_URL=redis://redis:6379/0
      - PASSWORD_PEPPER=${PASSWORD_PEPPER}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - MAX_AOI_AREA_KM2=${MAX_AOI_AREA_KM2:-10000}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    security_opt:
      - no-new-privileges:true

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password}@db/${DB_NAME:-makeit}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/tmp/sentinel_data
    depends_on:
      - db
      - redis
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
