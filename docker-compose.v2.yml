services:
  # 1. CORE DATABASE LAYER
  timescaledb:
    image: timescale/timescaledb-postgis:latest-pg15
    environment:
      POSTGRES_DB: makeit_v2
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - v2_db_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.12
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - v2_neo4j_data:/data

  # 2. STREAMING BACKBONE (KAFKA)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 3. HIGH-PERFORMANCE GO API
  api-gateway:
    build: 
      context: ./backend-v2-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://admin:password@timescaledb:5432/makeit_v2
      NEO4J_URL: bolt://neo4j:7687
      KAFKA_URL: kafka:29092
    depends_on:
      - timescaledb
      - neo4j
      - kafka

  # 4. AI CORE (PYTHON ML SERVICE)
  ai-engine:
    build: 
      context: ./ai-core-v2
      dockerfile: Dockerfile
    environment:
      KAFKA_URL: kafka:29092
      NEO4J_URL: bolt://neo4j:7687
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # 5. TACTICAL FRONTEND
  frontend-v2:
    build:
      context: ./frontend-v2
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

volumes:
  v2_db_data:
  v2_neo4j_data:
