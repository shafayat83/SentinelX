services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: makeit
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:password@db/makeit
      REDIS_URL: redis://redis:6379/0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://admin:password@db/makeit
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    # Add GPU support if available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
